apiVersion: apps/v1
kind: Deployment
metadata:
  name: pythontest
  namespace: tp3-jenkins # Ajout du namespace pour déployer au même endroit que Jenkins
  labels:
    app: pythontest
spec:
  selector:
    matchLabels:
      app: pythontest
  strategy:
    type: Recreate
  replicas: 1
  template:
    metadata:
      labels:
        app: pythontest
    spec:
      containers:
        - image: host.docker.internal:4000/pythontest:latest
          name: pythontest
          ports:
            - containerPort: 5000
              name: microport
---
apiVersion: v1
kind: Service
metadata:
  name: pythontest
  namespace: jenkins-nouvelle-instance
  labels:
    app: pythontest
spec:
  ports:
    - port: 5000
      nodePort: 31000
  selector:
    app: pythontest
  type: NodePort
